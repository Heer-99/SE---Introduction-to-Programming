<!DOCTYPE html>
<html>

<head>
    <title>Session 4 - Task 5</title>
</head>

<body>

    <h2>Pre-Increment and Post-Increment Example</h2>

    <script>

        // Variable Declaration
        let followerCount = 100;

        // Display Original Value
        document.write("<h3>Original Value</h3>");
        document.write("Follower Count : " + followerCount + "<br><br>");

        // Pre-Increment
        document.write("<h3>Pre-Increment (++count)</h3>");

        document.write("Value Before Pre-Increment : " + followerCount + "<br>");

        document.write("Pre-increment Result : " + (++followerCount) + "<br>");

        document.write("Value After Pre-Increment : " + followerCount + "<br><br>");

        // Reset Variable
        followerCount = 100;

        // Post-Increment
        document.write("<h3>Post-Increment (count++)</h3>");

        document.write("Value Before Post-Increment : " + followerCount + "<br>");

        document.write("Post-increment Result : " + (followerCount++) + "<br>");

        document.write("Value After Post-Increment : " + followerCount + "<br>");

    </script>

</body>

</html>
